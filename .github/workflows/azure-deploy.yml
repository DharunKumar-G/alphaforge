name: Deploy AlphaForge to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/alphaforge:${{ github.sha }} .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/alphaforge:${{ github.sha }}
        docker tag ${{ secrets.ACR_LOGIN_SERVER }}/alphaforge:${{ github.sha }} \
                   ${{ secrets.ACR_LOGIN_SERVER }}/alphaforge:latest
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/alphaforge:latest

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        acrName: ${{ secrets.ACR_NAME }}
        containerAppName: alphaforge
        resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
        imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/alphaforge:${{ github.sha }}
